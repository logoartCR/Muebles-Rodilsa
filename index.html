<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="MueblesRodilsafavicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Catálogo Muebles-Rodilsa</title>
  <meta name="description" content="Mira nuestro catálogo de Muebles-Rodilsa.">

  <!-- Open Graph (Vista previa en WhatsApp, Facebook, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Muebles-Rodilsa">
  <meta property="og:description" content="Mira nuestro catálogo de Muebles-Rodilsa.">
  <meta property="og:url" content="https://logoartcr.github.io/Muebles-Rodilsa/">
  <meta property="og:image" content="https://logoartcr.github.io/Muebles-Rodilsa/MueblesRodilsafavicon.png">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f4f4f4;
    }

    #mi-catalogo {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <iframe id="mi-catalogo" src=""></iframe>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const idProducto = (urlParams.get('id') || '').trim();

    let urlFinal = "https://script.google.com/macros/s/AKfycbzpO9sxhprwR2BsFUwuj5Dgks4Tvw4NFCW4C4hn6cA8QfmzfrO1PRl3ZJw3lYxRtG9S/exec";

    if (idProducto) {
      const conector = urlFinal.includes('?') ? '&' : '?';
      urlFinal += conector + "id=" + encodeURIComponent(idProducto);
    }

    document.getElementById('mi-catalogo').src = urlFinal;
  </script>

</body>
</html>
